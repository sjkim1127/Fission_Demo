name: Release (Tag)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  package-and-release:
    name: Package and Upload Release Assets
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify CMake
        shell: pwsh
        run: cmake --version

      - name: Setup vcpkg + zlib
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:USERPROFILE "vcpkg"
          if (-not (Test-Path $vcpkgRoot)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat")
          & (Join-Path $vcpkgRoot "vcpkg.exe") install zlib:x64-windows

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_INSTALLATION_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve release version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(.+)$') {
            $version = $Matches[1]
          } else {
            $version = $tag
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Resolved version: $version"

      - name: Package release assets
        shell: pwsh
        run: |
          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts/package-release.ps1",
            "-Version", "${{ steps.ver.outputs.version }}"
          )

          if (-not (Test-Path "signatures")) {
            Write-Host "[release] signatures directory not found. Packaging core only."
            $args += "-SkipSignatures"
          }

          & powershell @args
          if ($LASTEXITCODE -ne 0) {
            throw "package-release.ps1 failed"
          }

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem dist | Format-Table -AutoSize

      - name: Upload CI artifact snapshot
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
