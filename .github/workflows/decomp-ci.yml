name: Decompilation CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  decomp-smoke-windows:
    name: Native Decomp Smoke (Windows)
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify CMake
        shell: pwsh
        run: cmake --version

      - name: Setup vcpkg + zlib
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:USERPROFILE "vcpkg"
          if (-not (Test-Path $vcpkgRoot)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat")
          & (Join-Path $vcpkgRoot "vcpkg.exe") install zlib:x64-windows

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_INSTALLATION_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build fission_cli with native_decomp
        shell: pwsh
        run: cargo build --release --bin fission_cli --no-default-features --features native_decomp

      - name: Run decompilation smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/ci/decomp-smoke.ps1 -CliPath target/release/fission_cli.exe
